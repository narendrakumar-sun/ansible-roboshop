- name: mongodb configure
  hosts: mongodb
  become: yes
  tasks:
  - name: copy mongo repo
    ansible.builtin.copy:  # Copy module
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb server
    ansible.builtin.dnf:     # Install module
      name: mongodb-org
      state: present
  
  - name: allow remote connections
    ansible.builtin.replace:    # Replace module
      path: /etc/mongod.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

  - name: start and enable mongodb
    ansible.builtin.service:     # System service module
      name: mongod
      enabled: yes
      state: started

  